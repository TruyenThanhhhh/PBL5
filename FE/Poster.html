<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VietTravel — Quản lý bài đăng</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#faf7f2;--sand:#f0ead8;--brown:#2c1f0e;--brown2:#4a3520;
  --terra:#c4622d;--terra2:#a84e22;--terralight:#fdf5f0;
  --gold:#d4a853;--muted:#8a7560;--white:#fff;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
}
body{background:linear-gradient(180deg,#faf7f2 0%,#f7f2e8 100%);color:var(--brown);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 14% 12%,rgba(212,168,83,.08),transparent 32%),radial-gradient(circle at 86% 80%,rgba(196,98,45,.07),transparent 34%);z-index:-1}
nav{background:linear-gradient(160deg,#1a1008 0%,#2c1f0e 45%,#3d2a14 100%);padding:0 40px;display:flex;align-items:center;gap:20px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 10px 26px rgba(44,31,14,.2)}
.logo{font-family:var(--serif);font-size:22px;font-weight:700;color:#fff;text-decoration:none}
.logo span{color:var(--gold)}
.nav-badge{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}
nav .spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.8)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.btn-nav{padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:rgba(255,255,255,.8);font-family:var(--sans);transition:.2s}
.btn-nav:hover{background:rgba(255,255,255,.1);color:#fff}

/* Layout */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 60px)}
.sidebar{background:var(--white);border-right:1px solid var(--sand);padding:24px 0}
.sidebar-item{padding:11px 24px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:.15s;color:var(--brown2)}
.sidebar-item:hover{background:var(--terralight);color:var(--terra)}
.sidebar-item.active{background:var(--terralight);border-left-color:var(--terra);color:var(--terra);font-weight:500}
.sidebar-label{padding:16px 24px 6px;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.main{padding:36px 40px 44px;overflow-y:auto}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--white);border:1px solid var(--sand);border-radius:14px;padding:20px 24px;box-shadow:0 8px 20px rgba(44,31,14,.05)}
.stat-card .num{font-family:var(--serif);font-size:36px;font-weight:600;color:var(--terra);line-height:1}
.stat-card .label{font-size:13px;color:var(--muted);margin-top:4px}

/* Section header */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-title{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--brown)}
.btn-primary{padding:10px 20px;border-radius:10px;border:none;background:var(--terra);color:#fff;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--terra2);transform:translateY(-1px);box-shadow:0 10px 22px rgba(196,98,45,.22)}

/* Post list */
.post-list{display:flex;flex-direction:column;gap:14px}
.post-row{background:var(--white);border:1px solid var(--sand);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:.2s}
.post-row:hover{box-shadow:0 10px 24px rgba(44,31,14,.09);transform:translateY(-2px)}
.post-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;background:var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.post-thumb img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--brown);margin-bottom:4px}
.post-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.post-meta span{display:flex;align-items:center;gap:3px}
.post-actions{display:flex;gap:8px}
.btn-sm{padding:7px 14px;border-radius:8px;border:1.5px solid var(--sand);background:transparent;cursor:pointer;font-size:12px;font-family:var(--sans);transition:.2s;color:var(--brown2)}
.btn-sm:hover{border-color:var(--terra);color:var(--terra)}
.btn-sm.danger:hover{border-color:#c62828;color:#c62828}
.badge-hidden{background:#fff3e0;color:#e65100;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.badge-visible{background:#e8f5e9;color:#2e7d32;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(44,31,14,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--brown);margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:11px;font-weight:500;color:var(--brown2);letter-spacing:.5px;text-transform:uppercase}
.field input,.field textarea,.field select{padding:11px 14px;border:1.5px solid var(--sand);border-radius:10px;background:var(--cream);font-family:var(--sans);font-size:14px;color:var(--brown);outline:none;transition:.2s;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(196,98,45,.08)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{padding:10px 20px;border-radius:10px;border:1.5px solid var(--sand);background:transparent;cursor:pointer;font-family:var(--sans);font-size:13px;color:var(--muted);transition:.2s}
.btn-cancel:hover{border-color:var(--terra);color:var(--terra)}

/* Alert */
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert.error{background:#fdf0ec;border:1px solid #f5c4b0;color:#8b3a1a}
.alert.success{background:#edf7f0;border:1px solid #a8ddb9;color:#1a5c35}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;animation:fadeUp .2s ease;display:none}
.toast.show{display:block}
.toast.success{background:#2e7d32;color:#fff}
.toast.error{background:#c62828;color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}
.sidebar-item.disabled{opacity:.55;cursor:not-allowed}
</style>
</head>
<body>

<nav>
  <a class="logo" href="auth.html">Viet<span>Travel</span></a>
  <span class="nav-badge">🏨 Nhà cung cấp</span>
  <div class="spacer"></div>
  <div class="nav-user">
    <div class="nav-avatar" id="navAvatar">?</div>
    <span id="navName">—</span>
    <button class="btn-nav" onclick="doLogout()">Đăng xuất</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Quản lý</div>
    <div class="sidebar-item active" onclick="showSection('posts')">📋 Bài đăng của tôi</div>
    <div class="sidebar-item" onclick="showSection('new')">➕ Đăng bài mới</div>
    <div class="sidebar-label">Tài khoản</div>
    <div class="sidebar-item disabled">🔒 Không có quyền xem trang khách</div>
  </div>

  <div class="main" id="mainArea">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="num" id="statTotal">—</div><div class="label">Tổng bài đăng</div></div>
      <div class="stat-card"><div class="num" id="statLikes">—</div><div class="label">Lượt thích</div></div>
      <div class="stat-card"><div class="num" id="statReviews">—</div><div class="label">Đánh giá</div></div>
    </div>

    <!-- Posts section -->
    <div id="sectionPosts">
      <div class="sec-header">
        <div class="sec-title">Bài đăng của tôi</div>
        <button class="btn-primary" onclick="openModal()">➕ Đăng bài mới</button>
      </div>
      <div class="post-list" id="postList"><div class="empty"><div class="empty-icon">📋</div><p>Đang tải...</p></div></div>
    </div>
  </div>
</div>

<!-- Modal tạo/sửa bài -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Đăng bài mới</h2>
    <div class="alert" id="modalAlert"></div>
    <div class="field"><label>Tiêu đề</label><input id="fTitle" placeholder="Ví dụ: Khách sạn Sunrise Đà Nẵng"/></div>
    <div class="field"><label>Mô tả</label><textarea id="fDesc" rows="3" placeholder="Mô tả chi tiết về địa điểm..."></textarea></div>
    <div class="field"><label>Địa điểm</label>
      <select id="fLocation">
        <option value="">Chọn thành phố</option>
        <option>Đà Nẵng</option><option>Hà Nội</option><option>Hồ Chí Minh</option>
        <option>Hội An</option><option>Đà Lạt</option><option>Phú Quốc</option><option>Nha Trang</option><option>Huế</option>
      </select>
    </div>
    <div class="field"><label>Danh mục</label>
      <select id="fCategory">
        <option value="">Chọn danh mục</option>
        <option value="dia-danh">📍 Địa danh</option>
        <option value="am-thuc">🍜 Ẩm thực</option>
        <option value="khach-san">🏨 Khách sạn</option>
        <option value="cafe">☕ Café</option>
        <option value="giai-tri">🎡 Giải trí</option>
      </select>
    </div>
    <div class="field"><label>Giá tham khảo (VND)</label><input id="fPrice" type="number" min="0" step="1000" placeholder="Ví dụ: 250000"/></div>
    <div class="field"><label>Link ảnh (tuỳ chọn)</label><input id="fImage" placeholder="https://example.com/image.jpg"/></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn-primary" id="submitBtn" onclick="submitPost()">Đăng bài</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'http://localhost:5000';
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || 'null');

// Normalize legacy role "user" (if backend/DB still returns it).
const rawRole = (typeof user?.role === 'string' ? user.role.trim().toLowerCase() : 'viewer');
const role = rawRole === 'user' ? 'poster' : rawRole;

if(!token || !user || !['poster','admin'].includes(role)){
  alert('Bạn không có quyền truy cập trang này!');
  location.href = 'auth.html';
}

document.getElementById('navAvatar').textContent = (user?.username||'P')[0].toUpperCase();
document.getElementById('navName').textContent = user?.username || '';

let editingId = null;

async function loadMyPosts(){
  try{
    const res   = await fetch(`${BASE}/api/posts?createdBy=${user._id}`, {headers:{Authorization:`Bearer ${token}`}});
    const posts = await res.json();
    const list  = Array.isArray(posts) ? posts : posts.posts || [];

    // Stats
    const totalLikes   = list.reduce((s,p)=>s+(p.likes?.length||0), 0);
    const totalReviews = list.reduce((s,p)=>s+(p.totalReviews||0), 0);
    document.getElementById('statTotal').textContent   = list.length;
    document.getElementById('statLikes').textContent   = totalLikes;
    document.getElementById('statReviews').textContent = totalReviews;

    const el = document.getElementById('postList');
    if(!list.length){
      el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Chưa có bài đăng nào. <a href="#" onclick="openModal()" style="color:var(--terra)">Đăng bài đầu tiên!</a></p></div>`;
      return;
    }
    el.innerHTML = list.map(p => {
      const thumb = p.images?.[0]
        ? `<div class="post-thumb"><img src="${p.images[0]}" /></div>`
        : `<div class="post-thumb">🏔️</div>`;
      const badge = p.isHidden
        ? `<span class="badge-hidden">🙈 Đang ẩn</span>`
        : `<span class="badge-visible">✅ Hiển thị</span>`;
      return `
      <div class="post-row">
        ${thumb}
        <div class="post-info">
          <div class="post-title">${p.title} ${badge}</div>
          <div class="post-meta">
            <span>📍 ${p.location}</span>
            <span>🏷️ ${p.category}</span>
            <span>💵 ${formatPrice(p.price)}</span>
            <span>❤️ ${p.likes?.length||0} lượt thích</span>
            <span>⭐ ${p.averageRating||0} (${p.totalReviews||0} đánh giá)</span>
          </div>
        </div>
        <div class="post-actions">
          <button class="btn-sm" onclick="editPost('${p._id}')">✏️ Sửa</button>
          <button class="btn-sm danger" onclick="deletePost('${p._id}', this)">🗑️ Xóa</button>
        </div>
      </div>`;
    }).join('');
  } catch(e){
    document.getElementById('postList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Không kết nối được server</p></div>`;
  }
}

function openModal(post=null){
  editingId = post?._id || null;
  document.getElementById('modalTitle').textContent = post ? 'Chỉnh sửa bài' : 'Đăng bài mới';
  document.getElementById('fTitle').value    = post?.title || '';
  document.getElementById('fDesc').value     = post?.description || '';
  document.getElementById('fLocation').value = post?.location || '';
  document.getElementById('fCategory').value = post?.category || '';
  document.getElementById('fPrice').value    = Number.isFinite(post?.price) ? post.price : '';
  document.getElementById('fImage').value    = post?.images?.[0] || '';
  document.getElementById('modalAlert').className = 'alert';
  document.getElementById('submitBtn').textContent = post ? 'Lưu thay đổi' : 'Đăng bài';
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
function closeModalOutside(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

function editPost(id){
  // Lấy data từ DOM tạm — production nên fetch riêng
  fetch(`${BASE}/api/posts?`, {headers:{Authorization:`Bearer ${token}`}})
    .then(r=>r.json()).then(data=>{
      const list = Array.isArray(data) ? data : data.posts||[];
      const post = list.find(p=>p._id===id);
      if(post) openModal(post);
    });
}

async function deletePost(id, btn){
  if(!confirm('Xác nhận xóa bài này?')) return;
  btn.textContent='...';btn.disabled=true;
  try{
    const res = await fetch(`${BASE}/api/posts/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
    if(res.ok){ showToast('Đã xóa bài!'); loadMyPosts(); }
    else{ const d=await res.json(); showToast(d.message,'error'); }
  }catch{ showToast('Lỗi kết nối','error'); }
  finally{ btn.textContent='🗑️ Xóa';btn.disabled=false; }
}

async function submitPost(){
  const title    = document.getElementById('fTitle').value.trim();
  const desc     = document.getElementById('fDesc').value.trim();
  const location = document.getElementById('fLocation').value;
  const category = document.getElementById('fCategory').value;
  const priceRaw = document.getElementById('fPrice').value;
  const image    = document.getElementById('fImage').value.trim();
  const price    = priceRaw === '' ? null : Number(priceRaw);

  if(!title||!desc||!location||!category){
    showModalAlert('Vui lòng điền đầy đủ thông tin'); return;
  }
  if(priceRaw !== '' && (!Number.isFinite(price) || price < 0)){
    showModalAlert('Giá không hợp lệ'); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>Đang lưu...';
  btn.disabled = true;

  const body = { title, description:desc, location, category, price, images: image ? [image] : [] };
  const url  = editingId ? `${BASE}/api/posts/${editingId}` : `${BASE}/api/posts`;
  const method = editingId ? 'PUT' : 'POST';

  try{
    const res  = await fetch(url,{method,headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify(body)});
    const data = await res.json();
    if(res.ok){
      closeModal();
      showToast(editingId ? 'Đã cập nhật bài!' : 'Đăng bài thành công!');
      loadMyPosts();
    } else { showModalAlert(data.message||'Có lỗi xảy ra'); }
  }catch{ showModalAlert('Không kết nối được server'); }
  finally{ btn.innerHTML = editingId?'Lưu thay đổi':'Đăng bài'; btn.disabled=false; }
}

function showModalAlert(msg){
  const el = document.getElementById('modalAlert');
  el.textContent = '⚠ ' + msg;
  el.className = 'alert show error';
}

function showSection(s){
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if(s==='new') openModal();
}

function formatPrice(price){
  if(!Number.isFinite(Number(price)) || Number(price) < 0) return 'Chưa cập nhật';
  return `${Number(price).toLocaleString('vi-VN')} VND`;
}

function showToast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(()=>t.className='toast', 2500);
}

function doLogout(){
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  location.href = 'auth.html';
}

loadMyPosts();
</script>
</body>
</html>
